<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO & App Metadata -->
    <title>Slide2Audio — Fluid Synthesis</title>
    <meta name="description" content="Slide2Audio — Convert presentations and documents into high-fidelity spoken audio using AI-powered text-to-speech." />
    <meta name="keywords" content="slide to audio, text to speech, AI lecture, podcast generator, presentation to audio, TTS, document reader" />
    <meta name="author" content="Slide2Audio" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA Meta Tags (Android / Chrome) -->
    <meta name="theme-color" content="#8B5CF6" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- PWA Meta Tags (iOS / Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Slide2Audio" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Slide2Audio — Fluid Synthesis" />
    <meta property="og:description" content="Transform slides, reports, and PDFs into premium conversational spoken audio." />
    <meta property="og:image" content="/logo-512.png" />
    <meta property="og:site_name" content="Slide2Audio" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Slide2Audio — Fluid Synthesis" />
    <meta name="twitter:description" content="Transform slides, reports, and PDFs into premium conversational spoken audio." />
    <meta name="twitter:image" content="/logo-512.png" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((registration) => {
            console.log('SW registered:', registration.scope);
          }).catch((error) => {
            console.log('SW registration failed:', error);
          });
        });
      }
    </script>
  </body>
</html>
